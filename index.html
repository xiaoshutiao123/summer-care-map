<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>江苏公益暑托服务点位地图</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #eef7df;
      color: #203018;
    }
    .page {
      min-height: 100vh;
      background: linear-gradient(180deg, #f7f4df 0%, #e4f2cc 50%, #d5e9bd 100%);
      overflow: hidden;
    }
    .hero {
      padding: 18px 16px 8px;
      text-align: center;
    }
    .tag {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(75, 127, 47, .12);
      color: #4b7f2f;
      font-size: 13px;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }
    .subtitle {
      margin: 0 auto;
      max-width: 330px;
      font-size: 14px;
      line-height: 1.7;
      color: #526342;
    }
    .map-wrap {
      margin: 8px auto 18px;
      width: min(94vw, 520px);
      background: rgba(255,255,255,.64);
      border: 1px solid rgba(255,255,255,.8);
      border-radius: 28px;
      box-shadow: 0 18px 45px rgba(54, 96, 31, .18);
      padding: 10px;
      position: relative;
    }
    .map-tip {
      position: absolute;
      right: 20px;
      top: 20px;
      z-index: 4;
      font-size: 12px;
      color: #5f7c42;
      background: rgba(255,255,255,.82);
      border-radius: 999px;
      padding: 6px 10px;
      box-shadow: 0 4px 12px rgba(47, 86, 28, .12);
    }
    .illustration-map {
      position: relative;
      width: 100%;
      border-radius: 22px;
      overflow: hidden;
      background: #dff4cf;
    }
    .illustration-map img {
      width: 100%;
      display: block;
      user-select: none;
      -webkit-user-drag: none;
    }
    .map-error {
      display: none;
      padding: 90px 22px;
      text-align: center;
      line-height: 1.9;
      color: #52723b;
      background: #eef8df;
      border: 1px dashed #9fbd7a;
      border-radius: 22px;
      font-size: 14px;
    }
    .hotspot {
      position: absolute;
      border: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      background: rgba(255,255,255,0);
      border-radius: 50%;
      transform: translate(-50%, -50%);
    }
    .hotspot::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 255, 255, .72);
      border: 2px solid #5f913b;
      box-shadow: 0 0 0 6px rgba(95, 145, 59, .16);
      opacity: 0;
      transition: .2s ease;
    }
    .hotspot:hover::after,
    .hotspot.active::after {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1.15);
    }
    /* 点击热区位置：按这张 map.jiangsu.jpg 做了适配。后期可微调 left/top/width/height */
    .xuzhou { left: 22%; top: 17%; width: 23%; height: 11%; }
    .lianyungang { left: 53%; top: 26%; width: 22%; height: 10%; }
    .suqian { left: 23%; top: 37%; width: 22%; height: 10%; }
    .huaian { left: 39%; top: 45%; width: 22%; height: 10%; }
    .yancheng { left: 74%; top: 45%; width: 23%; height: 11%; }
    .yangzhou { left: 42%; top: 58%; width: 22%; height: 10%; }
    .taizhou { left: 61%; top: 61%; width: 22%; height: 10%; }
    .nanjing { left: 16%; top: 69%; width: 22%; height: 10%; }
    .zhenjiang { left: 31%; top: 76%; width: 22%; height: 10%; }
    .changzhou { left: 45%; top: 82%; width: 22%; height: 10%; }
    .wuxi { left: 62%; top: 78%; width: 22%; height: 10%; }
    .suzhou { left: 76%; top: 89%; width: 23%; height: 10%; }
    .nantong { left: 82%; top: 63%; width: 22%; height: 10%; }
    .panel {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      max-height: 84vh;
      transform: translateY(105%);
      transition: .28s ease;
      background: #fffdf2;
      border-radius: 26px 26px 0 0;
      box-shadow: 0 -18px 46px rgba(35, 63, 19, .24);
      z-index: 20;
      overflow: hidden;
    }
    .panel.show { transform: translateY(0); }
    .panel-head {
      padding: 16px 18px 12px;
      background: linear-gradient(135deg, #e7f3c8, #fff8d8);
      border-bottom: 1px solid #edf0d4;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .panel-title {
      margin: 0;
      font-size: 22px;
      font-weight: 900;
      color: #2f4e1e;
    }
    .panel-count {
      margin-top: 4px;
      color: #6b7a57;
      font-size: 13px;
    }
    .close {
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(71, 113, 42, .12);
      color: #3b5b25;
      font-size: 24px;
      line-height: 1;
    }
    .search-box {
      padding: 12px 16px;
      background: #fffdf2;
    }
    .search-box input {
      width: 100%;
      border: 1px solid #dde9c6;
      border-radius: 999px;
      padding: 11px 14px;
      outline: none;
      font-size: 14px;
      background: #fbfff2;
    }
    .list {
      padding: 0 16px 22px;
      overflow-y: auto;
      max-height: calc(84vh - 138px);
    }
    .card {
      background: #ffffff;
      border: 1px solid #edf0de;
      border-radius: 18px;
      padding: 14px;
      margin: 10px 0;
      box-shadow: 0 8px 22px rgba(62, 100, 37, .08);
    }
    .card h3 {
      margin: 0 0 9px;
      font-size: 17px;
      color: #2c4c1d;
    }
    .info {
      font-size: 13px;
      line-height: 1.65;
      color: #4c5a3f;
    }
    .actions {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .btn {
      text-decoration: none;
      border-radius: 999px;
      padding: 7px 11px;
      font-size: 13px;
      color: #fff;
      background: #5b913b;
    }
    .btn.secondary { background: #91a959; }
    .footer {
      padding: 0 18px 28px;
      text-align: center;
      color: rgba(40, 63, 25, .7);
      font-size: 12px;
      line-height: 1.7;
    }
    .mask {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(18, 34, 12, .28);
      z-index: 10;
    }
    .mask.show { display: block; }
  </style>
</head>
<body>
  <div class="page">
    <section class="hero">
      <div class="tag">2026 江苏省公益暑托服务</div>
      <p class="subtitle">点击地图上的城市，查看各市公益暑托服务点位、地址、联系人和报名方式。</p>
    </section>

    <section class="map-wrap">
      <div class="map-tip">点击城市查看点位</div>
      <div class="illustration-map" id="mapBox">
        <!-- 把你这张地图图片命名为 map.jiangsu.jpg，并与本 HTML 放在同一文件夹 -->
        <img src="./map.jiangsu.jpg" alt="江苏公益暑托服务十三市地图" onerror="this.style.display='none'; document.getElementById('mapError').style.display='block';" />
        <div id="mapError" class="map-error">
          地图图片未加载成功<br>
          请确认图片文件名为 <b>map.jiangsu.jpg</b><br>
          并且与本 HTML 文件放在同一目录
        </div>

        <button class="hotspot xuzhou" data-city="徐州" aria-label="徐州"></button>
        <button class="hotspot lianyungang" data-city="连云港" aria-label="连云港"></button>
        <button class="hotspot suqian" data-city="宿迁" aria-label="宿迁"></button>
        <button class="hotspot huaian" data-city="淮安" aria-label="淮安"></button>
        <button class="hotspot yancheng" data-city="盐城" aria-label="盐城"></button>
        <button class="hotspot yangzhou" data-city="扬州" aria-label="扬州"></button>
        <button class="hotspot taizhou" data-city="泰州" aria-label="泰州"></button>
        <button class="hotspot nanjing" data-city="南京" aria-label="南京"></button>
        <button class="hotspot zhenjiang" data-city="镇江" aria-label="镇江"></button>
        <button class="hotspot changzhou" data-city="常州" aria-label="常州"></button>
        <button class="hotspot wuxi" data-city="无锡" aria-label="无锡"></button>
        <button class="hotspot suzhou" data-city="苏州" aria-label="苏州"></button>
        <button class="hotspot nantong" data-city="南通" aria-label="南通"></button>
      </div>
    </section>

    <div class="footer">心有所“暑”，不负所“托”<br>公益暑托服务，让爱陪伴成长</div>
  </div>

  <div class="mask" id="mask" onclick="closePanel()"></div>
  <aside class="panel" id="panel">
    <div class="panel-head">
      <div>
        <h2 class="panel-title" id="panelTitle">南京市</h2>
        <div class="panel-count" id="panelCount">共 0 个服务点</div>
      </div>
      <button class="close" onclick="closePanel()">×</button>
    </div>
    <div class="search-box">
      <input id="keyword" type="search" placeholder="搜索点位名称 / 地址 / 联系人" oninput="renderList()" />
    </div>
    <div class="list" id="pointList"></div>
  </aside>

  <script>
    // 正式上线时，把这里替换成真实点位数据即可。
    const cityData = {
      南京: [
        { name: "鼓楼区公益暑托服务点", address: "南京市鼓楼区××街道党群服务中心", contact: "张老师", phone: "13800000000", remark: "示例数据，请替换为正式点位信息。", signup: "#" },
        { name: "建邺区公益暑托服务点", address: "南京市建邺区××社区新时代文明实践站", contact: "李老师", phone: "13900000000", remark: "具体招募及服务安排以属地团组织通知为准。", signup: "#" }
      ],
      无锡: [{ name: "梁溪区公益暑托服务点", address: "无锡市梁溪区××街道", contact: "王老师", phone: "13700000000", remark: "示例数据，请替换。", signup: "#" }],
      徐州: [{ name: "云龙区公益暑托服务点", address: "徐州市云龙区××社区", contact: "赵老师", phone: "13600000000", remark: "示例数据，请替换。", signup: "#" }],
      常州: [{ name: "天宁区公益暑托服务点", address: "常州市天宁区××街道", contact: "陈老师", phone: "13500000000", remark: "示例数据，请替换。", signup: "#" }],
      苏州: [{ name: "姑苏区公益暑托服务点", address: "苏州市姑苏区××社区", contact: "周老师", phone: "13400000000", remark: "示例数据，请替换。", signup: "#" }],
      南通: [{ name: "崇川区公益暑托服务点", address: "南通市崇川区××街道", contact: "吴老师", phone: "13300000000", remark: "示例数据，请替换。", signup: "#" }],
      连云港: [{ name: "海州区公益暑托服务点", address: "连云港市海州区××社区", contact: "郑老师", phone: "13200000000", remark: "示例数据，请替换。", signup: "#" }],
      淮安: [{ name: "清江浦区公益暑托服务点", address: "淮安市清江浦区××街道", contact: "孙老师", phone: "13100000000", remark: "示例数据，请替换。", signup: "#" }],
      盐城: [{ name: "亭湖区公益暑托服务点", address: "盐城市亭湖区××社区", contact: "刘老师", phone: "13000000000", remark: "示例数据，请替换。", signup: "#" }],
      扬州: [{ name: "广陵区公益暑托服务点", address: "扬州市广陵区××街道", contact: "钱老师", phone: "13811111111", remark: "示例数据，请替换。", signup: "#" }],
      镇江: [{ name: "京口区公益暑托服务点", address: "镇江市京口区××社区", contact: "何老师", phone: "13822222222", remark: "示例数据，请替换。", signup: "#" }],
      泰州: [{ name: "海陵区公益暑托服务点", address: "泰州市海陵区××街道", contact: "黄老师", phone: "13833333333", remark: "示例数据，请替换。", signup: "#" }],
      宿迁: [{ name: "宿城区公益暑托服务点", address: "宿迁市宿城区××社区", contact: "马老师", phone: "13844444444", remark: "示例数据，请替换。", signup: "#" }]
    };

    let currentCity = "";

    document.querySelectorAll('.hotspot').forEach(item => {
      item.addEventListener('click', () => {
        document.querySelectorAll('.hotspot').forEach(c => c.classList.remove('active'));
        item.classList.add('active');
        openCity(item.dataset.city);
      });
    });

    function openCity(city) {
      currentCity = city;
      document.getElementById('keyword').value = '';
      document.getElementById('panelTitle').innerText = city + '市';
      document.getElementById('panel').classList.add('show');
      document.getElementById('mask').classList.add('show');
      renderList();
    }

    function closePanel() {
      document.getElementById('panel').classList.remove('show');
      document.getElementById('mask').classList.remove('show');
      document.querySelectorAll('.hotspot').forEach(c => c.classList.remove('active'));
    }

    function renderList() {
      const keyword = document.getElementById('keyword').value.trim().toLowerCase();
      const data = cityData[currentCity] || [];
      const filtered = data.filter(p => {
        const text = [p.name, p.address, p.contact, p.phone, p.remark].join(' ').toLowerCase();
        return text.includes(keyword);
      });
      document.getElementById('panelCount').innerText = `共 ${filtered.length} 个服务点`;
      const list = document.getElementById('pointList');
      if (!filtered.length) {
        list.innerHTML = '<div class="card"><div class="info">暂无匹配点位，请更换关键词。</div></div>';
        return;
      }
      list.innerHTML = filtered.map(p => `
        <div class="card">
          <h3>${escapeHtml(p.name)}</h3>
          <div class="info">
            <div>📍 地址：${escapeHtml(p.address)}</div>
            <div>👤 联系人：${escapeHtml(p.contact)}</div>
            <div>☎️ 电话：${escapeHtml(p.phone)}</div>
            <div>📝 备注：${escapeHtml(p.remark || '以属地团组织通知为准')}</div>
          </div>
          <div class="actions">
            <a class="btn" href="tel:${p.phone}">拨打电话</a>
            <a class="btn secondary" href="${p.signup || '#'}">报名/查看详情</a>
          </div>
        </div>
      `).join('');
    }

    function escapeHtml(str) {
      return String(str || '').replace(/[&<>'"]/g, s => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
      }[s]));
    }
  </script>
</body>
</html>
