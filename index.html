function openCity(city){currentCity=city;document.getElementById('keyword').value='';document.getElementById('panelTitle').innerText=city+'市';buildCountyFilter();document.getElementById('panel').classList.add('show');document.getElementById('mask').classList.add('show');renderList();}
function closePanel(){document.getElementById('panel').classList.remove('show');document.getElementById('mask').classList.remove('show');document.querySelectorAll('.hotspot').forEach(c=>c.classList.remove('active'));}
function buildCountyFilter(){const sel=document.getElementById('countyFilter');const data=cityData[currentCity]||[];const counties=[...new Set(data.map(p=>p.county).filter(Boolean))];sel.innerHTML='<option value="">全部县区</option>'+counties.map(c=>`<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');}
function renderList(){const keyword=document.getElementById('keyword').value.trim().toLowerCase();const county=document.getElementById('countyFilter').value;const data=cityData[currentCity]||[];const filtered=data.filter(p=>{const text=[p.name,p.county,p.street,p.address,p.contact,p.phone,p.email,p.classTime,p.serviceTime,p.requirement,p.remark].join(' ').toLowerCase();return(!keyword||text.includes(keyword))&&(!county||p.county===county);});document.getElementById('panelCount').innerText=`共 ${filtered.length} 个服务点`;const list=document.getElementById('pointList');if(!filtered.length){list.innerHTML='<div class="card"><div class="info">暂无匹配点位，请更换关键词或县区。</div></div>';return;}list.innerHTML=filtered.map(p=>`<div class="card"><h3>${escapeHtml(p.name)}</h3><div class="chips">${p.county?`<span class="chip">${escapeHtml(p.county)}</span>`:''}${p.street?`<span class="chip">${escapeHtml(p.street)}</span>`:''}${p.volunteers?`<span class="chip">招募${escapeHtml(p.volunteers)}</span>`:''}</div><div class="info"><div>📍 地址：${escapeHtml(p.address)}</div>${p.classTime?`<div>📅 开班时间：${escapeHtml(p.classTime)}</div>`:''}${p.serviceTime?`<div>🕘 到岗服务：${escapeHtml(p.serviceTime)}</div>`:''}<div>👤 联系人：${escapeHtml(p.contact||'待定')}</div>${p.phone?`<div>☎️ 电话：${escapeHtml(p.phone)}</div>`:''}${p.email?`<div>✉️ 邮箱：${escapeHtml(p.email)}</div>`:''}${p.requirement?`<div class="req">📝 要求：${escapeHtml(p.requirement)}</div>`:(p.remark?`<div class="req">📝 备注：${escapeHtml(p.remark)}</div>`:'')}</div><div class="actions">${p.phone?`<a class="btn" href="tel:${escapeHtml(p.phone)}">拨打电话</a>`:''}<button class="btn secondary" onclick='showDetail(${JSON.stringify(p).replace(/'/g,"&#39;")})'>查看详情</button></div></div>`).join('');}

${p.requirement||p.remark||''}`);}function escapeHtml(str){return String(str||'').replace(/[&<>'"]/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[s]));}
